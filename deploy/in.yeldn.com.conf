# nginx reverse-proxy vhost for YeldnIN (in.yeldn.com -> 127.0.0.1:3200)
# On a CWP server, place/merge this under /etc/nginx/conf.d/ (or the vhosts dir)
# and let CWP AutoSSL issue the certificate, then: nginx -t && systemctl reload nginx
#
# This mirrors the existing veeey-app.conf reverse-proxy pattern on the box.

server {
    listen 80;
    server_name in.yeldn.com;
    # Allow Let's Encrypt/AutoSSL HTTP-01 challenges, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /usr/local/apache/autossl_tmp/; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name in.yeldn.com;

    # CWP/AutoSSL-managed certificate paths (adjust to the issued cert):
    ssl_certificate     /etc/letsencrypt/live/in.yeldn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/in.yeldn.com/privkey.pem;

    client_max_body_size 35m; # allow 32 MB uploads (+headroom)

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300;
    }
}
